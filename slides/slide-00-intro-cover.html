<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 00 · Intro Cover · AC Hotel Marketing Strategy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#B8945A;
    --gold-soft:#C5A572;
    --cream:#FAF7F2;
    --ink:#1A1A1A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Inter','Noto Sans KR',sans-serif;background:#0a0a0a;color:var(--cream);-webkit-font-smoothing:antialiased}
  .deck{display:flex;flex-direction:column;align-items:center;gap:32px;padding:40px 20px}
  .slide{
    width:1280px;height:720px;
    position:relative;overflow:hidden;
    background:#0a0a0a;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    transform-origin:top center;
  }
  @media (max-width:1340px){.slide{transform:scale(.72)}.deck{gap:0}}
  @media (max-width:900px){.slide{transform:scale(.45)}}
  @media (max-width:600px){.slide{transform:scale(.28)}}

  /* ── Mosaic ─────────────────────────────────────── */
  .mosaic{
    position:absolute;inset:0;
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:repeat(8,1fr);
    gap:1px;
    background:rgba(184,148,90,.18);
  }
  .mosaic img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .m1{grid-column:1/4;grid-row:1/9}
  .m2{grid-column:4/6;grid-row:1/6}
  .m3{grid-column:6/10;grid-row:1/4}
  .m4{grid-column:10/13;grid-row:1/6}
  .m5{grid-column:4/6;grid-row:6/9}
  .m6{grid-column:6/10;grid-row:4/7}
  .m7{grid-column:10/13;grid-row:6/9}
  .m8{grid-column:6/8;grid-row:7/9}
  .m9{grid-column:8/10;grid-row:7/9}

  /* ── Black scrim overlay ────────────────────────── */
  .scrim{
    position:absolute;inset:0;pointer-events:none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,.55) 0%,
        rgba(0,0,0,.32) 32%,
        rgba(0,0,0,.30) 60%,
        rgba(0,0,0,.55) 100%);
  }
  .scrim::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 35%, rgba(0,0,0,.18) 100%);
  }

  /* ── Title text ─────────────────────────────────── */
  .intro-text{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--cream);text-align:center;gap:24px;
    z-index:2;
  }
  .intro-eyebrow{
    font-family:'Inter';font-size:11px;font-weight:500;
    letter-spacing:.42em;color:var(--gold-soft);
    text-transform:uppercase;
  }
  .intro-rule{
    width:96px;height:1px;background:var(--gold);opacity:.85;
  }
  .intro-title{
    font-family:'Inter','Noto Sans KR',sans-serif;
    font-size:52px;font-weight:300;letter-spacing:.34em;
    text-transform:uppercase;
    text-shadow:0 2px 24px rgba(0,0,0,.45);
    padding-left:.34em; /* visual centering against trailing letter-spacing */
  }
  .intro-title .dot{color:var(--gold);margin:0 .18em;font-weight:400}
  .intro-tag{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:22px;font-weight:400;letter-spacing:.02em;
    color:rgba(250,247,242,.86);
    text-shadow:0 2px 16px rgba(0,0,0,.4);
  }

  /* ── Footer meta ────────────────────────────────── */
  .intro-foot{
    position:absolute;bottom:30px;left:0;right:0;
    text-align:center;z-index:2;
    font-family:'Inter';font-size:10px;letter-spacing:.34em;
    color:rgba(250,247,242,.72);text-transform:uppercase;
  }
  .intro-mark{
    position:absolute;top:30px;left:0;right:0;
    text-align:center;z-index:2;
    font-family:'Inter';font-size:10px;letter-spacing:.42em;
    color:rgba(250,247,242,.62);text-transform:uppercase;
  }
  .intro-mark::before,.intro-mark::after{
    content:'';display:inline-block;width:24px;height:1px;
    background:rgba(250,247,242,.4);
    vertical-align:middle;margin:0 14px;
  }
</style>
</head>
<body>
<div class="deck">

<!-- ========== SLIDE 00: INTRO COVER ========== -->
<div class="slide intro-cover" id="s0">

  <div class="mosaic">
    <img class="m1" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-29%20003.png" alt="">
    <img class="m2" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-28%20002.png" alt="">
    <img class="m3" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-30%20008.png" alt="">
    <img class="m4" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-28%20001.png" alt="">
    <img class="m5" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-29%20005.png" alt="">
    <img class="m6" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-30%20009.png" alt="">
    <img class="m7" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-30%20007.png" alt="">
    <img class="m8" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-29%20004.png" alt="">
    <img class="m9" src="../cover/KakaoTalk_Photo_2026-05-03-23-33-29%20006.png" alt="">
  </div>

  <div class="scrim"></div>

  <div class="intro-mark">AC Hotel by Marriott Gangnam</div>

  <div class="intro-text">
    <div class="intro-eyebrow">Marketing Strategy Proposal</div>
    <div class="intro-rule"></div>
    <h1 class="intro-title">AC HOTEL <span class="dot">·</span> MARKETING STRATEGY 2026</h1>
    <div class="intro-rule"></div>
    <p class="intro-tag">More Than Hotels.</p>
  </div>

  <div class="intro-foot">Heensun &nbsp;·&nbsp; Proposed by Jay Moon &nbsp;·&nbsp; May 2026</div>

</div>

</div>
</body>
</html>
